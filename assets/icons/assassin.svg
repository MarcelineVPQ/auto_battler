<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Assassin: Dagger with dripping poison -->
  <circle cx="64" cy="64" r="60" fill="#1A1A2E" stroke="#6A0DAD" stroke-width="4"/>
  <!-- Dagger blade -->
  <polygon points="64,15 52,70 64,65 76,70" fill="#C0C0C0" stroke="#808080" stroke-width="1"/>
  <!-- Blade edge highlight -->
  <line x1="64" y1="18" x2="64" y2="62" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  <!-- Guard -->
  <ellipse cx="64" cy="73" rx="18" ry="5" fill="#8B6914"/>
  <!-- Handle -->
  <rect x="59" y="76" width="10" height="25" rx="2" fill="#4A2800"/>
  <line x1="60" y1="82" x2="68" y2="82" stroke="#8B6914" stroke-width="2"/>
  <line x1="60" y1="89" x2="68" y2="89" stroke="#8B6914" stroke-width="2"/>
  <!-- Pommel -->
  <circle cx="64" cy="104" r="6" fill="#8B6914"/>
  <!-- Poison drips -->
  <circle cx="56" cy="50" r="3" fill="#00FF88" opacity="0.7"/>
  <circle cx="58" cy="60" r="2" fill="#00FF88" opacity="0.5"/>
  <circle cx="72" cy="45" r="2.5" fill="#00FF88" opacity="0.6"/>
</svg>