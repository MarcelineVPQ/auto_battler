<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Assassin: Twin daggers crossed - stealthy killer -->
  <circle cx="64" cy="64" r="60" fill="#1A1A2E" stroke="#6A0DAD" stroke-width="4"/>
  <!-- Left dagger blade -->
  <polygon points="38,20 28,72 38,68 48,72" fill="#C0C0C0" stroke="#808080" stroke-width="1"/>
  <line x1="38" y1="24" x2="38" y2="65" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  <!-- Left guard -->
  <ellipse cx="38" cy="74" rx="14" ry="4" fill="#8B6914"/>
  <!-- Left handle -->
  <rect x="34" y="77" width="8" height="20" rx="2" fill="#4A2800"/>
  <circle cx="38" cy="100" r="4" fill="#8B6914"/>
  <!-- Right dagger blade -->
  <polygon points="90,20 80,72 90,68 100,72" fill="#C0C0C0" stroke="#808080" stroke-width="1"/>
  <line x1="90" y1="24" x2="90" y2="65" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  <!-- Right guard -->
  <ellipse cx="90" cy="74" rx="14" ry="4" fill="#8B6914"/>
  <!-- Right handle -->
  <rect x="86" y="77" width="8" height="20" rx="2" fill="#4A2800"/>
  <circle cx="90" cy="100" r="4" fill="#8B6914"/>
  <!-- Poison drips -->
  <circle cx="32" cy="50" r="3" fill="#00FF88" opacity="0.7"/>
  <circle cx="96" cy="45" r="2.5" fill="#00FF88" opacity="0.6"/>
  <circle cx="84" cy="60" r="2" fill="#00FF88" opacity="0.5"/>
</svg>