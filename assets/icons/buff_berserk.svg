<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Berserk: Broken chain / rage skull -->
  <circle cx="32" cy="28" r="16" fill="#D32F2F" stroke="#B71C1C" stroke-width="2"/>
  <!-- Angry eyes -->
  <line x1="22" y1="22" x2="28" y2="26" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="42" y1="22" x2="36" y2="26" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="26" cy="28" r="2" fill="#FFFFFF"/>
  <circle cx="38" cy="28" r="2" fill="#FFFFFF"/>
  <!-- Jagged mouth -->
  <polyline points="22,36 26,32 30,36 34,32 38,36 42,32" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Rage flames -->
  <path d="M 20 12 Q 22 6 24 12 Q 26 4 28 12" fill="#FF6F00" opacity="0.7"/>
  <path d="M 36 12 Q 38 4 40 12 Q 42 6 44 12" fill="#FF6F00" opacity="0.7"/>
  <!-- Down arrow (HP loss) -->
  <polygon points="32,48 26,56 38,56" fill="#FF8A80" opacity="0.6"/>
