<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Haymaker: Fist with impact burst -->
  <circle cx="32" cy="30" r="14" fill="#FF6F00" stroke="#E65100" stroke-width="2"/>
  <!-- Fist shape -->
  <rect x="24" y="24" width="16" height="14" rx="4" fill="#FFAB40"/>
  <rect x="24" y="22" width="4" height="8" rx="2" fill="#FFB74D"/>
  <rect x="29" y="20" width="4" height="10" rx="2" fill="#FFB74D"/>
  <rect x="34" y="22" width="4" height="8" rx="2" fill="#FFB74D"/>
  <!-- Impact lines -->
  <line x1="14" y1="14" x2="8" y2="8" stroke="#FFAB40" stroke-width="2" opacity="0.7"/>
  <line x1="50" y1="14" x2="56" y2="8" stroke="#FFAB40" stroke-width="2" opacity="0.7"/>
  <line x1="32" y1="8" x2="32" y2="2" stroke="#FFAB40" stroke-width="2" opacity="0.7"/>
  <!-- 3x label -->
  <text x="32" y="56" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFAB40">3x</text>
</svg>