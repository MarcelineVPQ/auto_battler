<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Relentless: Rising sword with kill marks -->
  <polygon points="32,4 27,30 32,26 37,30" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
  <line x1="32" y1="8" x2="32" y2="24" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  <rect x="29" y="32" width="6" height="12" rx="1" fill="#8D6E63"/>
  <!-- Kill marks (notches) -->
  <line x1="20" y1="50" x2="20" y2="58" stroke="#FFD54F" stroke-width="2"/>
  <line x1="26" y1="50" x2="26" y2="58" stroke="#FFD54F" stroke-width="2"/>
  <line x1="32" y1="50" x2="32" y2="58" stroke="#FFD54F" stroke-width="2"/>
  <!-- Up arrow -->
  <polygon points="46,20 42,28 50,28" fill="#4CAF50" opacity="0.7"/>
  <rect x="44" y="28" width="4" height="10" fill="#4CAF50" opacity="0.7"/>
</svg>