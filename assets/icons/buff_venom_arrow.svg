<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Venom Arrow (Archer): Arrow with poison drip -->
  <line x1="14" y1="52" x2="50" y2="12" stroke="#8D6E63" stroke-width="2.5"/>
  <!-- Arrowhead -->
  <polygon points="50,12 40,12 50,22" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
  <!-- Fletching -->
  <polygon points="14,52 18,46 10,46" fill="#A1887F" opacity="0.7"/>
  <!-- Poison drips -->
  <ellipse cx="46" cy="22" rx="2" ry="3" fill="#66BB6A" opacity="0.8"/>
  <ellipse cx="42" cy="30" rx="1.5" ry="2.5" fill="#66BB6A" opacity="0.6"/>
  <ellipse cx="44" cy="36" rx="1" ry="2" fill="#66BB6A" opacity="0.4"/>
</svg>