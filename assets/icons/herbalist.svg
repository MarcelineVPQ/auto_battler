<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Herbalist: Leaf with dewdrop - nature healer/brewer -->
  <circle cx="64" cy="64" r="60" fill="#1B3D1B" stroke="#66BB6A" stroke-width="4"/>
  <!-- Main leaf shape -->
  <path d="M 64 15 Q 100 40 95 75 Q 88 100 64 112 Q 40 100 33 75 Q 28 40 64 15 Z"
        fill="#4CAF50" stroke="#66BB6A" stroke-width="2"/>
  <!-- Leaf vein - center -->
  <line x1="64" y1="22" x2="64" y2="108" stroke="#2E7D32" stroke-width="3"/>
  <!-- Leaf veins - sides -->
  <line x1="64" y1="45" x2="42" y2="55" stroke="#2E7D32" stroke-width="2"/>
  <line x1="64" y1="45" x2="86" y2="55" stroke="#2E7D32" stroke-width="2"/>
  <line x1="64" y1="65" x2="38" y2="75" stroke="#2E7D32" stroke-width="2"/>
  <line x1="64" y1="65" x2="90" y2="75" stroke="#2E7D32" stroke-width="2"/>
  <line x1="64" y1="82" x2="45" y2="92" stroke="#2E7D32" stroke-width="2"/>
  <line x1="64" y1="82" x2="83" y2="92" stroke="#2E7D32" stroke-width="2"/>
  <!-- Dewdrop -->
  <ellipse cx="52" cy="50" r="7" ry="9" fill="#81D4FA" opacity="0.6"/>
  <circle cx="50" cy="47" r="3" fill="#FFFFFF" opacity="0.5"/>
</svg>