<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Paladin: Glowing hammer - holy warrior -->
  <circle cx="64" cy="64" r="60" fill="#2E1A47" stroke="#C8A82E" stroke-width="4"/>
  <!-- Hammer handle -->
  <rect x="60" y="55" width="8" height="55" rx="2" fill="#8B6914"/>
  <line x1="61" y1="65" x2="67" y2="65" stroke="#C8A82E" stroke-width="2"/>
  <line x1="61" y1="80" x2="67" y2="80" stroke="#C8A82E" stroke-width="2"/>
  <!-- Hammer head -->
  <rect x="36" y="28" width="56" height="30" rx="5" fill="#C8A82E" stroke="#FFD700" stroke-width="2"/>
  <!-- Hammer face details -->
  <rect x="40" y="32" width="18" height="22" rx="3" fill="#B8981E"/>
  <rect x="70" y="32" width="18" height="22" rx="3" fill="#B8981E"/>
  <!-- Holy glow -->
  <circle cx="64" cy="43" r="8" fill="#FFFACD" opacity="0.4"/>
  <circle cx="64" cy="43" r="4" fill="#FFFFFF" opacity="0.6"/>
  <!-- Light rays from hammer -->
  <line x1="64" y1="15" x2="64" y2="23" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
  <line x1="45" y1="18" x2="49" y2="25" stroke="#FFD700" stroke-width="2" opacity="0.5"/>
  <line x1="83" y1="18" x2="79" y2="25" stroke="#FFD700" stroke-width="2" opacity="0.5"/>
</svg>