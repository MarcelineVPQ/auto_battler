<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Paladin: Shield with glowing cross - armor-healing support -->
  <circle cx="64" cy="64" r="60" fill="#2E1A47" stroke="#C8A82E" stroke-width="4"/>
  <!-- Shield body -->
  <path d="M 64 18 L 98 35 L 98 70 Q 98 100 64 115 Q 30 100 30 70 L 30 35 Z"
        fill="#C8A82E" stroke="#FFD700" stroke-width="3"/>
  <!-- Shield inner border -->
  <path d="M 64 28 L 90 42 L 90 68 Q 90 93 64 105 Q 38 93 38 68 L 38 42 Z"
        fill="none" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
  <!-- Holy cross -->
  <rect x="58" y="36" width="12" height="56" rx="2" fill="#FFFACD" opacity="0.9"/>
  <rect x="42" y="52" width="44" height="12" rx="2" fill="#FFFACD" opacity="0.9"/>
  <!-- Glow effect on cross -->
  <rect x="60" y="38" width="8" height="52" rx="1" fill="#FFFFFF" opacity="0.4"/>
  <rect x="44" y="54" width="40" height="8" rx="1" fill="#FFFFFF" opacity="0.4"/>
</svg>
