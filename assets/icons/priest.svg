<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Priest: Glowing staff with ankh top - divine healer -->
  <circle cx="64" cy="64" r="60" fill="#2A2010" stroke="#FFD700" stroke-width="4"/>
  <!-- Staff shaft -->
  <rect x="60" y="38" width="8" height="75" rx="2" fill="#CD853F"/>
  <line x1="61" y1="55" x2="67" y2="55" stroke="#FFD700" stroke-width="2"/>
  <line x1="61" y1="85" x2="67" y2="85" stroke="#FFD700" stroke-width="2"/>
  <!-- Ankh loop at top -->
  <circle cx="64" cy="26" r="14" fill="none" stroke="#FFD700" stroke-width="5"/>
  <circle cx="64" cy="26" r="7" fill="#FFFACD" opacity="0.3"/>
  <!-- Cross arms -->
  <rect x="44" y="38" width="40" height="8" rx="2" fill="#FFD700"/>
  <!-- Healing glow -->
  <circle cx="64" cy="26" r="20" fill="#FFD700" opacity="0.1"/>
  <!-- Sparkles around ankh -->
  <circle cx="42" cy="18" r="2" fill="#FFF9C4" opacity="0.7"/>
  <circle cx="86" cy="22" r="2" fill="#FFF9C4" opacity="0.6"/>
  <circle cx="44" cy="36" r="2" fill="#FFF9C4" opacity="0.5"/>
  <circle cx="84" cy="36" r="2" fill="#FFF9C4" opacity="0.6"/>
</svg>