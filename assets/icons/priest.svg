<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Priest: Ankh/holy cross with halo - healer/support -->
  <circle cx="64" cy="64" r="60" fill="#FFD700" stroke="#FFF176" stroke-width="4" opacity="0.2"/>
  <circle cx="64" cy="64" r="60" fill="none" stroke="#FFD700" stroke-width="4"/>
  <!-- Halo ring -->
  <ellipse cx="64" cy="28" rx="22" ry="8" fill="none" stroke="#FFD700" stroke-width="3" opacity="0.8"/>
  <!-- Cross vertical -->
  <rect x="57" y="32" width="14" height="70" rx="3" fill="#FFD700"/>
  <!-- Cross horizontal -->
  <rect x="38" y="52" width="52" height="14" rx="3" fill="#FFD700"/>
  <!-- Inner glow lines -->
  <rect x="60" y="36" width="8" height="62" rx="2" fill="#FFF9C4" opacity="0.5"/>
  <rect x="42" y="55" width="44" height="8" rx="2" fill="#FFF9C4" opacity="0.5"/>
  <!-- Light rays -->
  <line x1="64" y1="10" x2="64" y2="18" stroke="#FFD700" stroke-width="2" opacity="0.5"/>
  <line x1="44" y1="16" x2="48" y2="22" stroke="#FFD700" stroke-width="2" opacity="0.5"/>
  <line x1="84" y1="16" x2="80" y2="22" stroke="#FFD700" stroke-width="2" opacity="0.5"/>
</svg>