<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Summoner: Open spellbook with portal - conjurer -->
  <circle cx="64" cy="64" r="60" fill="#0D1B2A" stroke="#1B4965" stroke-width="4"/>
  <!-- Book base -->
  <path d="M 20 45 L 64 38 L 108 45 L 108 105 L 64 98 L 20 105 Z" fill="#3E2723" stroke="#5D4037" stroke-width="2"/>
  <!-- Book spine -->
  <line x1="64" y1="38" x2="64" y2="98" stroke="#5D4037" stroke-width="3"/>
  <!-- Left page -->
  <path d="M 24 48 L 62 42 L 62 95 L 24 101 Z" fill="#F5F5DC" opacity="0.8"/>
  <!-- Right page -->
  <path d="M 66 42 L 104 48 L 104 101 L 66 95 Z" fill="#F5F5DC" opacity="0.8"/>
  <!-- Portal rising from book -->
  <ellipse cx="64" cy="38" rx="22" ry="10" fill="#5BC0EB" opacity="0.3"/>
  <circle cx="64" cy="28" r="16" fill="none" stroke="#5BC0EB" stroke-width="2" opacity="0.6"/>
  <circle cx="64" cy="28" r="8" fill="#5BC0EB" opacity="0.3"/>
  <circle cx="64" cy="28" r="4" fill="#E0F7FA" opacity="0.7"/>
  <!-- Sparkles -->
  <circle cx="46" cy="20" r="2" fill="#E0F7FA" opacity="0.6"/>
  <circle cx="82" cy="22" r="2" fill="#E0F7FA" opacity="0.5"/>
  <circle cx="64" cy="12" r="2" fill="#E0F7FA" opacity="0.7"/>
  <!-- Rune marks on pages -->
  <line x1="30" y1="58" x2="55" y2="55" stroke="#5BC0EB" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="68" x2="55" y2="65" stroke="#5BC0EB" stroke-width="1" opacity="0.5"/>
  <line x1="73" y1="55" x2="98" y2="58" stroke="#5BC0EB" stroke-width="1" opacity="0.5"/>
  <line x1="73" y1="65" x2="98" y2="68" stroke="#5BC0EB" stroke-width="1" opacity="0.5"/>
</svg>