<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Summoner: Pentagram portal - summons units -->
  <circle cx="64" cy="64" r="60" fill="#0D1B2A" stroke="#1B4965" stroke-width="4"/>
  <!-- Outer portal ring -->
  <circle cx="64" cy="64" r="44" fill="none" stroke="#5BC0EB" stroke-width="3" opacity="0.6"/>
  <circle cx="64" cy="64" r="48" fill="none" stroke="#5BC0EB" stroke-width="1" opacity="0.3"/>
  <!-- Pentagram star -->
  <polygon points="64,20 76,56 112,56 82,76 92,112 64,90 36,112 46,76 16,56 52,56"
           fill="none" stroke="#5BC0EB" stroke-width="3"/>
  <!-- Inner glow -->
  <circle cx="64" cy="64" r="18" fill="#5BC0EB" opacity="0.15"/>
  <!-- Center eye/orb -->
  <circle cx="64" cy="64" r="10" fill="#5BC0EB" opacity="0.4"/>
  <circle cx="64" cy="64" r="5" fill="#E0F7FA" opacity="0.8"/>
  <!-- Sparkles -->
  <circle cx="40" cy="35" r="2" fill="#E0F7FA" opacity="0.6"/>
  <circle cx="90" cy="40" r="2" fill="#E0F7FA" opacity="0.5"/>
  <circle cx="85" cy="95" r="2" fill="#E0F7FA" opacity="0.6"/>
  <circle cx="38" cy="90" r="2" fill="#E0F7FA" opacity="0.5"/>
</svg>