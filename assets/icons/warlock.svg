<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Warlock: Flaming skull - dark magic dealer -->
  <circle cx="64" cy="64" r="60" fill="#2D0A3E" stroke="#9C27B0" stroke-width="4"/>
  <!-- Skull -->
  <ellipse cx="64" cy="65" rx="28" ry="30" fill="#E8E8D0"/>
  <!-- Eye sockets -->
  <ellipse cx="52" cy="58" rx="8" ry="10" fill="#2D0A3E"/>
  <ellipse cx="76" cy="58" rx="8" ry="10" fill="#2D0A3E"/>
  <!-- Eye glow -->
  <ellipse cx="52" cy="59" rx="4" ry="5" fill="#CE39EB" opacity="0.8"/>
  <ellipse cx="76" cy="59" rx="4" ry="5" fill="#CE39EB" opacity="0.8"/>
  <!-- Nose -->
  <polygon points="61,68 67,68 64,74" fill="#2D0A3E"/>
  <!-- Teeth -->
  <rect x="50" y="80" width="6" height="8" rx="1" fill="#E8E8D0"/>
  <rect x="58" y="80" width="6" height="10" rx="1" fill="#E8E8D0"/>
  <rect x="66" y="80" width="6" height="10" rx="1" fill="#E8E8D0"/>
  <rect x="74" y="80" width="6" height="8" rx="1" fill="#E8E8D0"/>
  <!-- Flames on top -->
  <path d="M 42 42 Q 45 22 52 35 Q 50 12 60 30 Q 58 8 68 28 Q 72 10 76 32 Q 80 15 82 35 Q 85 22 86 42"
        fill="#9C27B0" opacity="0.85" stroke="#CE93D8" stroke-width="1"/>
  <!-- Purple fire highlight -->
  <path d="M 50 40 Q 54 25 60 35 Q 62 18 68 32 Q 72 20 74 38"
        fill="#CE93D8" opacity="0.4"/>
</svg>